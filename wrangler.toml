# Cloudflare Pages configuration (frontend only)
# Deploy: npx wrangler pages deploy client/build --project-name=yjrl
#
# Or connect GitHub repo in Cloudflare Dashboard:
#   Build command: cd client && npm install && npm run build
#   Build output:  client/build
#   Root directory: /
#
# IMPORTANT: Set this environment variable in CF Pages dashboard:
#   REACT_APP_API_URL = https://yjrl-api.<your-subdomain>.workers.dev/api
#
# The API Worker is in the worker/ directory with its own wrangler.toml.
# Deploy it separately: cd worker && npx wrangler deploy

name = "yjrl"
compatibility_date = "2024-12-01"
