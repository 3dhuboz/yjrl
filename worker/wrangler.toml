name = "yjrl-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
FROM_EMAIL = "noreply@yeppoonjrl.com.au"
ALLOWED_ORIGINS = "https://yeppoonjrl.com.au,https://www.yeppoonjrl.com.au"
UPLOADS_PUBLIC_URL = "https://uploads.yeppoonjrl.com.au"
FRONTEND_URL = "https://yeppoonjrl.com.au"
API_PUBLIC_URL = "https://yjrl-api.steve-700.workers.dev/api"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "yjrl-db"
database_id = "690424d2-5985-4576-9d4c-62e643ae5ed3"

# R2 Storage
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "yjrl-uploads"

# Cron trigger for daily email reminders (8am AEST = 10pm UTC previous day)
[triggers]
crons = ["0 22 * * *"]

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# ADMIN_EMAIL
# ADMIN_PASSWORD
# PAYPAL_CLIENT_ID
# PAYPAL_CLIENT_SECRET
# PAYPAL_MODE (sandbox or live)
# RESEND_API_KEY
# CHILD_SAFETY_SIGNOFF (set to approved only after club launch sign-off)
# CLICKSEND_USERNAME / CLICKSEND_API_KEY if SMS is required
# OPENROUTER_API_KEY if AI features are required
